<svg width="1100" height="760" viewBox="0 0 1100 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Orbital Forge IP incubation map</title>
<desc id="desc">A stylized map showing ideas flowing through research, prototype, evidence, protection, and product pathways.</desc>
<rect width="1100" height="760" rx="34" fill="#07111f"/>
