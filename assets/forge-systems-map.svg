<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="title desc">
  <title id="title">Orbital Forge prototype system map</title>
  <desc id="desc">A stylized map showing research, software prototypes, mission data, AI assistance, edge systems, and transition artifacts connected through an incubation core.</desc>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5ee7ff" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#8bffd7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#5ee7ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5ee7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="760" height="460" rx="26" fill="#050816"/>
  <g opacity="0.24" stroke="#9eacc2" stroke-width="1">
    <path d="M80 60H680M80 140H680M80 220H680M80 300H680M80 380H680"/>
    <path d="M140 40V420M260 40V420M380 40V420M500 40V420M620 40V420"/>
  </g>
  <circle cx="380" cy="230" r="142" fill="url(#core)"/>
  <g fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.8" filter="url(#glow)">
    <path d="M380 230C300 164 220 138 132 122"/>
    <path d="M380 230C490 154 570 132 646 112"/>
    <path d="M380 230C274 238 208 280 132 338"/>
    <path d="M380 230C492 244 574 286 646 340"/>
    <path d="M380 230C380 158 380 98 380 62"/>
    <path d="M380 230C380 318 380 370 380 404"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">
    <g transform="translate(272 164)">
      <rect width="216" height="132" rx="28" fill="#0c1426" stroke="#5ee7ff" stroke-opacity="0.55"/>
      <circle cx="108" cy="66" r="36" fill="none" stroke="url(#g1)" stroke-width="8" opacity="0.95"/>
      <circle cx="108" cy="66" r="9" fill="#5ee7ff"/>
      <text x="108" y="116" text-anchor="middle" fill="#edf3ff" font-size="18">Incubation Core</text>
    </g>
    <g fill="#edf3ff" font-size="15">
      <g transform="translate(58 88)"><rect width="164" height="68" rx="18" fill="#101b34" stroke="#9eacc2" stroke-opacity="0.26"/><text x="82" y="32" text-anchor="middle">Mission Data</text><text x="82" y="52" text-anchor="middle" fill="#9eacc2" font-size="12">fusion + APIs</text></g>
      <g transform="translate(538 78)"><rect width="164" height="68" rx="18" fill="#101b34" stroke="#9eacc2" stroke-opacity="0.26"/><text x="82" y="32" text-anchor="middle">AI Workflows</text><text x="82" y="52" text-anchor="middle" fill="#9eacc2" font-size="12">operator support</text></g>
      <g transform="translate(54 306)"><rect width="170" height="68" rx="18" fill="#101b34" stroke="#9eacc2" stroke-opacity="0.26"/><text x="85" y="32" text-anchor="middle">Edge Systems</text><text x="85" y="52" text-anchor="middle" fill="#9eacc2" font-size="12">autonomy + sensors</text></g>
      <g transform="translate(538 306)"><rect width="164" height="68" rx="18" fill="#101b34" stroke="#9eacc2" stroke-opacity="0.26"/><text x="82" y="32" text-anchor="middle">Transition</text><text x="82" y="52" text-anchor="middle" fill="#9eacc2" font-size="12">demo + artifacts</text></g>
      <g transform="translate(285 32)"><rect width="190" height="62" rx="18" fill="#101b34" stroke="#9eacc2" stroke-opacity="0.26"/><text x="95" y="29" text-anchor="middle">R&D Sprints</text><text x="95" y="48" text-anchor="middle" fill="#9eacc2" font-size="12">hypothesis driven</text></g>
      <g transform="translate(285 372)"><rect width="190" height="62" rx="18" fill="#101b34" stroke="#9eacc2" stroke-opacity="0.26"/><text x="95" y="29" text-anchor="middle">Evidence</text><text x="95" y="48" text-anchor="middle" fill="#9eacc2" font-size="12">logs + replay</text></g>
    </g>
  </g>
</svg>
